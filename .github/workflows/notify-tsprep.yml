name: Notify ts-prep on push

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in ts-prep
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.TSREPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/lxandrexl/ts-prep/dispatches \
            -d '{"event_type":"neetcode-push"}'
